<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke com Cifra</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ícones Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .cifra-text { font-family: 'Courier New', Courier, monospace; }
        .cifra-text-bold { font-weight: bold; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        @media print {
            body { background-color: #fff !important; color: #000 !important; }
            .print-hidden { display: none !important; }
            .print-cifra-box { background: transparent !important; border: none !important; padding: 0 !important; box-shadow: none !important; overflow: visible !important; }
            .cifra-text { color: #000 !important; white-space: pre-wrap !important; word-wrap: break-word !important; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // ==========================================
        // CONFIGURAÇÃO DA NUVEM (BANCO DE DADOS)
        // ==========================================
        const MINHAS_CHAVES_DE_NUVEM = {
            apiKey: "AIzaSyCXVoQvpKZW4Ta317aHDOebAVPYwbCDlUk",
            authDomain: "karaoke-cifra-app.firebaseapp.com",
            projectId: "karaoke-cifra-app",
            storageBucket: "karaoke-cifra-app.firebasestorage.app",
            messagingSenderId: "610450602429",
            appId: "1:610450602429:web:5f2b81f9a486dff1a3fad4"
        }; 

        let app, auth, dbFirestore, appId;
        let isCloudConfigured = false;

        if (typeof __firebase_config !== 'undefined') {
            app = initializeApp(JSON.parse(__firebase_config));
            auth = getAuth(app);
            dbFirestore = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
            isCloudConfigured = true;
        } else if (MINHAS_CHAVES_DE_NUVEM) {
            app = initializeApp(MINHAS_CHAVES_DE_NUVEM);
            auth = getAuth(app);
            dbFirestore = getFirestore(app);
            appId = 'karaoke-com-cifra-site'; 
            isCloudConfigured = true;
        }

        const CATEGORIAS = [
            "Sertanejo", "MPB", "Flashbacks", "Internacionais", "Pop Rock Nacional", 
            "Gospel/Religioso", "Rock Internacional", "Samba", "Pagode", "Bregas", 
            "Alternativo", "Hip Hop/Rap", "Axé", "Arrocha/Forró", "Blues", "Infantil", "Outros"
        ];

        // Lógica de Transposição Musical
        const SCALE = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        const transposeChord = (chordStr, steps) => {
            if (steps === 0) return chordStr;
            
            // Divide o acorde por barras para tratar baixos (Ex: G/B)
            return chordStr.split('/').map(part => {
                // Regex para capturar a nota raiz (A-G e # ou b) e o resto do acorde (m, 7, etc)
                const match = part.match(/^([A-G][#b]?)(.*)$/);
                if (!match) return part; // Se não for acorde válido, ignora
                
                let note = match[1];
                let suffix = match[2];

                // Converte bemóis para sustenidos para facilitar a matemática na array SCALE
                if (note === 'Db') note = 'C#';
                if (note === 'Eb') note = 'D#';
                if (note === 'Gb') note = 'F#';
                if (note === 'Ab') note = 'G#';
                if (note === 'Bb') note = 'A#';

                let index = SCALE.indexOf(note);
                if (index === -1) return part; // Se falhar, devolve original

                // Calcula a nova posição
                let newIndex = (index + steps) % 12;
                if (newIndex < 0) newIndex += 12;

                return SCALE[newIndex] + suffix;
            }).join('/');
        };

        const getYouTubeId = (url) => {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState({ artists: [], songs: [] });
            const [loading, setLoading] = useState(true);

            // UI
            const [view, setView] = useState('home'); 
            const [activeArtist, setActiveArtist] = useState(null);
            const [activeSong, setActiveSong] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [search, setSearch] = useState('');
            const [showPix, setShowPix] = useState(false);

            // Admin
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [adminTab, setAdminTab] = useState('songs');
            
            // Edição / Criação
            const [editingArtistId, setEditingArtistId] = useState(null);
            const [newArtist, setNewArtist] = useState({ name: '', cover: '' });
            
            const [editingSongId, setEditingSongId] = useState(null);
            const [newSong, setNewSong] = useState({ artistId: '', album: '', category: 'Outros', title: '', key: '', bpm: '', flacLink: '', backingTrackLink: '', youtubeLink: '', cifra: '' });

            // Formatação da Cifra (Cifra Club Mode)
            const [cifraFontSize, setCifraFontSize] = useState(16);
            const [cifraColumns, setCifraColumns] = useState(1);
            const [cifraBold, setCifraBold] = useState(false);
            const [transposeSteps, setTransposeSteps] = useState(0);
            const [chordColor, setChordColor] = useState('#34d399'); // Default Verde Escuro/Ciano

            useEffect(() => {
                if (!isCloudConfigured) {
                    setLoading(false);
                    return;
                }

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !isCloudConfigured) return;

                const artistsRef = collection(dbFirestore, 'artifacts', appId, 'public', 'data', 'artists');
                const songsRef = collection(dbFirestore, 'artifacts', appId, 'public', 'data', 'songs');

                const unsubArtists = onSnapshot(artistsRef, (snapshot) => {
                    const artistsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setDb(prev => ({ ...prev, artists: artistsData.sort((a,b) => a.name.localeCompare(b.name)) }));
                });

                const unsubSongs = onSnapshot(songsRef, (snapshot) => {
                    const songsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Organizar por data de criação descrescente (Novidades)
                    setDb(prev => ({ ...prev, songs: songsData.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)) }));
                    setLoading(false);
                });

                return () => { unsubArtists(); unsubSongs(); };
            }, [user]);

            // Navegação
            const goHome = () => { setView('home'); window.scrollTo(0, 0); };
            const goCategory = (cat) => { setActiveCategory(cat); setView('category'); window.scrollTo(0, 0); };
            const goArtist = (artist) => { setActiveArtist(artist); setView('artist'); window.scrollTo(0, 0); };
            const goSong = (song) => { 
                setActiveSong(song); 
                // Reset as ferramentas ao abrir nova música
                setCifraFontSize(16); setCifraColumns(1); setCifraBold(false); setTransposeSteps(0);
                setView('song'); window.scrollTo(0, 0); 
            };
            const goAdmin = () => { isAdminAuthenticated ? setView('admin') : setView('admin-login'); window.scrollTo(0, 0); };

            const filteredSongsBySearch = search 
                ? db.songs.filter(s => s.title.toLowerCase().includes(search.toLowerCase()) || db.artists.find(a => a.id === s.artistId)?.name.toLowerCase().includes(search.toLowerCase()))
                : [];

            const renderHome = () => {
                const latestSongs = db.songs.slice(0, 6);

                return (
                    <div className="animate-[fadeIn_0.5s_ease-out]">
                        <div className="text-center py-12 md:py-16 px-4 mb-10 bg-gradient-to-br from-slate-900 to-slate-950 rounded-[3rem] border border-slate-800 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-[-20%] left-[-10%] text-emerald-500/5 rotate-12 pointer-events-none">
                                <i className="ph-fill ph-microphone-stage text-[300px]"></i>
                            </div>
                            <div className="relative z-10">
                                <h2 className="text-5xl md:text-7xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500 tracking-tight">
                                    Karaoke com Cifra
                                </h2>
                                <p className="text-slate-300 text-xl md:text-2xl max-w-2xl mx-auto font-medium">
                                    O seu palco virtual. <br/>
                                    <span className="text-emerald-400">Cifras, Backing Tracks e Áudio FLAC</span> num só lugar.
                                </p>
                            </div>
                        </div>

                        {search && (
                            <div className="mb-12">
                                <h3 className="text-2xl font-bold text-slate-100 mb-6 flex items-center gap-2"><i className="ph-fill ph-magnifying-glass text-emerald-500"></i> Resultados para "{search}"</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {filteredSongsBySearch.map(song => {
                                        const artist = db.artists.find(a => a.id === song.artistId);
                                        return (
                                            <div key={song.id} onClick={() => goSong(song)} className="bg-slate-900 border border-slate-800 p-4 rounded-2xl cursor-pointer hover:border-emerald-500/50 transition-all flex items-center gap-4 group shadow-lg">
                                                <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center text-emerald-500 group-hover:bg-emerald-500 group-hover:text-slate-900 transition-colors shrink-0">
                                                    <i className="ph-fill ph-play"></i>
                                                </div>
                                                <div className="overflow-hidden">
                                                    <h4 className="font-bold text-slate-200 truncate group-hover:text-emerald-400 transition-colors">{song.title}</h4>
                                                    <p className="text-slate-500 text-sm truncate">{artist?.name}</p>
                                                </div>
                                            </div>
                                        )
                                    })}
                                    {filteredSongsBySearch.length === 0 && <p className="text-slate-500">Nenhuma música ou artista encontrado.</p>}
                                </div>
                            </div>
                        )}

                        {!search && (
                            <div className="mb-16">
                                <h3 className="text-2xl font-bold text-slate-100 mb-6 flex items-center gap-2">
                                    <i className="ph-fill ph-sparkle text-emerald-500"></i> Novidades
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {latestSongs.map(song => {
                                        const artist = db.artists.find(a => a.id === song.artistId);
                                        return (
                                            <div key={song.id} onClick={() => goSong(song)} className="bg-slate-900 border border-slate-800 p-4 rounded-2xl cursor-pointer hover:border-emerald-500/50 transition-all flex items-center gap-4 group shadow-lg">
                                                <div className="w-14 h-14 rounded-full bg-slate-800 flex items-center justify-center text-emerald-500 group-hover:bg-emerald-500 group-hover:text-slate-900 transition-colors shrink-0">
                                                    <i className="ph-fill ph-music-notes-simple text-xl"></i>
                                                </div>
                                                <div className="overflow-hidden">
                                                    <h4 className="font-bold text-slate-200 text-lg truncate group-hover:text-emerald-400 transition-colors">{song.title}</h4>
                                                    <p className="text-slate-500 text-sm truncate">{artist?.name} • <span className="text-slate-600">{song.category}</span></p>
                                                </div>
                                            </div>
                                        )
                                    })}
                                    {latestSongs.length === 0 && <p className="text-slate-500">A sua nuvem de músicas ainda está vazia.</p>}
                                </div>
                            </div>
                        )}

                        {!search && (
                            <div className="mb-16">
                                <h3 className="text-2xl font-bold text-slate-100 mb-6 flex items-center gap-2">
                                    <i className="ph-fill ph-playlist text-emerald-500"></i> Explorar por Categoria
                                </h3>
                                <div className="flex flex-wrap gap-3">
                                    {CATEGORIAS.map(cat => {
                                        const count = db.songs.filter(s => s.category === cat).length;
                                        if (count === 0) return null;
                                        return (
                                            <button 
                                                key={cat} 
                                                onClick={() => goCategory(cat)}
                                                className="bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-emerald-500 px-5 py-3 rounded-full text-slate-200 font-bold transition-all flex items-center gap-2 shadow-md"
                                            >
                                                {cat} <span className="bg-slate-950 text-emerald-400 text-xs px-2 py-1 rounded-full">{count}</span>
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {!search && (
                            <div>
                                <h3 className="text-2xl font-bold text-slate-100 mb-6 flex items-center gap-2">
                                    <i className="ph-fill ph-users-three text-emerald-500"></i> Todos os Artistas
                                </h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                    {db.artists.map(artist => (
                                        <div key={artist.id} onClick={() => goArtist(artist)} className="group cursor-pointer bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-emerald-500/50 transition-all text-center pb-4 shadow-xl">
                                            <div className="aspect-square relative overflow-hidden bg-slate-800 mb-3">
                                                {artist.cover ? (
                                                    <img src={artist.cover} alt={artist.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                                ) : (
                                                    <div className="w-full h-full flex items-center justify-center text-4xl text-slate-600"><i className="ph-fill ph-user"></i></div>
                                                )}
                                            </div>
                                            <h4 className="font-bold text-slate-200 px-2 truncate group-hover:text-emerald-400 transition-colors">{artist.name}</h4>
                                        </div>
                                    ))}
                                    {db.artists.length === 0 && <p className="text-slate-500 col-span-2">Sem artistas registados.</p>}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderCategory = () => {
                const songs = db.songs.filter(s => s.category === activeCategory);
                return (
                    <div className="animate-[fadeIn_0.3s_ease-out]">
                        <button onClick={goHome} className="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 mb-6 font-medium">
                            <i className="ph ph-arrow-left font-bold"></i> Voltar
                        </button>
                        
                        <div className="bg-gradient-to-r from-emerald-900/40 to-slate-900 border border-slate-800 rounded-3xl p-8 mb-8 shadow-2xl">
                            <h2 className="text-4xl font-black text-slate-100 flex items-center gap-4">
                                <i className="ph-fill ph-playlist text-emerald-500"></i> {activeCategory}
                            </h2>
                            <p className="text-slate-400 mt-2">{songs.length} músicas nesta categoria</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {songs.map(song => {
                                const artist = db.artists.find(a => a.id === song.artistId);
                                return (
                                    <div key={song.id} onClick={() => goSong(song)} className="bg-slate-900 border border-slate-800 p-4 rounded-2xl cursor-pointer hover:border-emerald-500/50 transition-all flex items-center gap-4 group shadow-lg">
                                        <div className="w-14 h-14 rounded-full bg-slate-800 flex items-center justify-center text-emerald-500 group-hover:bg-emerald-500 group-hover:text-slate-900 transition-colors shrink-0">
                                            <i className="ph-fill ph-play text-xl"></i>
                                        </div>
                                        <div className="overflow-hidden">
                                            <h4 className="font-bold text-slate-200 text-lg truncate">{song.title}</h4>
                                            <p className="text-slate-500 text-sm truncate">{artist?.name} {song.album ? `• ${song.album}` : ''}</p>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                );
            }

            const renderArtist = () => {
                const songs = db.songs.filter(s => s.artistId === activeArtist.id);
                return (
                    <div className="animate-[fadeIn_0.3s_ease-out]">
                        <button onClick={goHome} className="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 mb-6 font-medium">
                            <i className="ph ph-arrow-left font-bold"></i> Voltar
                        </button>

                        <div className="flex flex-col md:flex-row gap-6 mb-10 items-center md:items-start bg-slate-900 border border-slate-800 p-6 md:p-8 rounded-3xl shadow-2xl">
                            {activeArtist.cover ? (
                                <img src={activeArtist.cover} alt={activeArtist.name} className="w-32 h-32 md:w-48 md:h-48 rounded-full object-cover border-4 border-slate-800 shadow-xl shrink-0" />
                            ) : (
                                <div className="w-32 h-32 md:w-48 md:h-48 rounded-full bg-slate-800 border-4 border-slate-700 flex items-center justify-center text-5xl text-slate-600 shrink-0">
                                    <i className="ph-fill ph-user"></i>
                                </div>
                            )}
                            <div className="text-center md:text-left pt-4">
                                <h2 className="text-4xl md:text-5xl font-black text-slate-100">{activeArtist.name}</h2>
                                <p className="text-emerald-500 mt-2 font-bold uppercase tracking-widest text-sm">{songs.length} músicas cadastradas</p>
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
                            <div className="bg-slate-800/80 p-5 border-b border-slate-700/50">
                                <h3 className="font-bold text-lg text-slate-100 flex items-center gap-2"><i className="ph-fill ph-music-notes text-emerald-500"></i> Repertório</h3>
                            </div>
                            <div className="divide-y divide-slate-800/50">
                                {songs.map(song => (
                                    <div key={song.id} onClick={() => goSong(song)} className="p-4 flex items-center justify-between hover:bg-slate-800/50 cursor-pointer group transition-colors">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-slate-950 border border-slate-800 flex items-center justify-center text-emerald-500 group-hover:bg-emerald-500 group-hover:text-slate-900 transition-colors shrink-0">
                                                <i className="ph-fill ph-play"></i>
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-slate-200 text-lg group-hover:text-emerald-400 transition-colors">{song.title}</h4>
                                                <p className="text-slate-500 text-sm">
                                                    Tom: <span className="font-bold text-slate-400">{song.key || '-'}</span> • 
                                                    BPM: <span className="font-bold text-slate-400">{song.bpm || '-'}</span> • 
                                                    {song.album && <span className="text-slate-400">{song.album} • </span>}
                                                    {song.category}
                                                </p>
                                            </div>
                                        </div>
                                        <i className="ph ph-caret-right text-slate-600 group-hover:text-emerald-500 text-xl hidden md:block"></i>
                                    </div>
                                ))}
                                {songs.length === 0 && <div className="p-8 text-center text-slate-500">Sem músicas registadas neste artista.</div>}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderSong = () => {
                const ytId = getYouTubeId(activeSong.youtubeLink);
                const artist = db.artists.find(a => a.id === activeSong.artistId);

                // Função que aplica a transposição na string HTML
                const getProcessedCifraHtml = () => {
                    if (!activeSong.cifra) return "";
                    // Regex procura tudo dentro de <b> e </b>
                    const regex = /<b>(.*?)<\/b>/g;
                    return activeSong.cifra.replace(regex, (match, chordContent) => {
                        const transposed = transposeChord(chordContent, transposeSteps);
                        // Injeta a cor personalizada no atributo style
                        return `<b style="color: ${chordColor}">${transposed}</b>`;
                    });
                };

                return (
                    <div className="animate-[fadeIn_0.3s_ease-out] print-cifra-box">
                        <button onClick={() => goArtist(artist)} className="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 mb-6 font-medium print-hidden transition-colors">
                            <i className="ph ph-arrow-left font-bold"></i> Voltar para {artist?.name}
                        </button>

                        <div className="grid lg:grid-cols-[1.2fr_1fr] gap-8 mb-8 print-hidden">
                            {/* Bloco Info e Botões (Esquerda) */}
                            <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden flex flex-col justify-center">
                                <div className="absolute top-[-10%] right-[-5%] text-slate-800/30 rotate-12 pointer-events-none">
                                    <i className="ph-fill ph-speaker-hifi text-[250px]"></i>
                                </div>
                                
                                <div className="relative z-10">
                                    <span className="bg-slate-800 text-emerald-400 text-xs font-bold px-3 py-1 rounded-full mb-4 inline-block border border-slate-700">{activeSong.category}</span>
                                    <h2 className="text-4xl md:text-5xl font-black text-slate-100 mb-2 leading-tight">{activeSong.title}</h2>
                                    <p className="text-2xl text-emerald-500 mb-6 font-bold flex flex-wrap items-center gap-2">
                                        {artist?.name} 
                                        {activeSong.album && <span className="text-slate-400 font-normal text-lg bg-slate-900 px-3 py-1 rounded-lg border border-slate-700">💿 {activeSong.album}</span>}
                                    </p>
                                    
                                    <div className="flex gap-4 mb-8 text-sm text-slate-300 flex-wrap">
                                        <span className="bg-slate-950 px-4 py-2 rounded-lg border border-slate-800 flex items-center gap-2 shadow-inner"><i className="ph-fill ph-music-note text-emerald-500"></i> Tom Original: <b className="text-white">{activeSong.key || '?'}</b></span>
                                        <span className="bg-slate-950 px-4 py-2 rounded-lg border border-slate-800 flex items-center gap-2 shadow-inner"><i className="ph-fill ph-metronome text-emerald-500"></i> BPM: <b className="text-white">{activeSong.bpm || '?'}</b></span>

                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const size = 500; 
                            canvas.width = size;
                            canvas.height = size;
                            const ctx = canvas.getContext('2d');
                            
                            const minSize = Math.min(img.width, img.height);
                            const startX = (img.width - minSize) / 2;
                            const startY = (img.height - minSize) / 2;
                            
                            ctx.drawImage(img, startX, startY, minSize, minSize, 0, 0, size, size);
                            const base64 = canvas.toDataURL('image/jpeg', 0.8);

                        img.src = event.target.result;

                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 flex flex-col shadow-xl">
                                    <h3 className="text-xl font-bold mb-4 border-b border-slate-800 pb-2">Biblioteca de Músicas</h3>
                                    <div className="flex-1 overflow-y-auto pr-2 space-y-2 max-h-[800px]">
                                        {db.songs.map(s => {
                                            const artist = db.artists.find(a => a.id === s.artistId);
                                            return (
                                                <div key={s.id} className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex justify-between items-center group">
                                                    <div>
                                                        <p className="font-bold text-slate-200 text-lg">{s.title}</p>
                                                        <p className="text-sm text-slate-500">{artist?.name} <span className="mx-2">•</span> <span className="text-emerald-500/70">{s.category}</span> {s.album && <span>• 💿 {s.album}</span>}</p>
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => editSong(s)} className="text-slate-600 hover:text-blue-400 p-2 transition-colors" title="Editar">
                                                            <i className="ph-fill ph-pencil-simple text-xl"></i>
                                                        </button>
                                                        <button onClick={() => handleDeleteSong(s.id)} className="text-slate-600 hover:text-red-500 p-2 transition-colors" title="Apagar">
                                                            <i className="ph-fill ph-trash text-xl"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {db.songs.length === 0 && <p className="text-slate-500 text-center py-10">A nuvem está vazia.</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Artistas */}
                        {adminTab === 'artists' && (
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl">
                                    <div className="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                                        <h3 className="text-xl font-bold text-emerald-400">{editingArtistId ? 'Editar Artista' : 'Novo Artista'}</h3>
                                        {editingArtistId && <button onClick={() => {setEditingArtistId(null); setNewArtist({ name: '', cover: '', genre: '' });}} className="text-xs bg-slate-800 px-2 py-1 rounded text-slate-300 hover:text-white">Cancelar Edição</button>}
                                    </div>
                                    <form onSubmit={handleAddOrUpdateArtist} className="flex flex-col gap-5">
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1 font-bold">Nome do Artista/Banda</label>
                                            <input required type="text" value={newArtist.name} onChange={e => setNewArtist({...newArtist, name: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none transition-colors" placeholder="Ex: Roupa Nova" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1 font-bold">Gênero Principal</label>
                                            <select required value={newArtist.genre} onChange={e => setNewArtist({...newArtist, genre: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 outline-none focus:border-emerald-500 transition-colors">
                                                <option value="">Selecione...</option>
                                                {CATEGORIAS.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-inner">
                                            <label className="block text-sm text-slate-400 mb-3 font-bold"><i className="ph-fill ph-image"></i> Imagem do Artista</label>
                                            
                                            <div className="mb-4">
                                                <label className="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer hover:bg-slate-800/50 hover:border-emerald-500 transition-colors">
                                                    <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                                        <i className="ph ph-upload-simple text-2xl text-slate-400 mb-2"></i>
                                                        <p className="text-sm text-slate-500"><span className="font-semibold text-emerald-500">Clique para enviar</span> (Cortamos quadrada p/ você)</p>
                                                    </div>
                                                    <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                                </label>
                                            </div>

                                            <p className="text-center text-slate-600 text-xs mb-4">- OU COLOQUE A URL -</p>

                                            <div>
                                                <input type="url" value={newArtist.cover} onChange={e => setNewArtist({...newArtist, cover: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none text-sm" placeholder="https://..." />
                                            </div>

                                            {newArtist.cover && (
                                                <div className="mt-4 flex items-center justify-center gap-4 border-t border-slate-800 pt-4">
                                                    <p className="text-sm text-emerald-500 font-bold">Preview:</p>
                                                    <img src={newArtist.cover} className="w-16 h-16 rounded-full object-cover border-2 border-emerald-500 shadow-lg" />
                                                </div>
                                            )}
                                        </div>

                                        <button type="submit" className="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold p-4 rounded-xl shadow-lg mt-2 transition-transform hover:scale-[1.02]">{editingArtistId ? 'Atualizar Artista' : 'Salvar Artista na Nuvem'}</button>
                                    </form>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                                    <h3 className="text-xl font-bold mb-4 border-b border-slate-800 pb-2">Lista de Artistas</h3>
                                    <div className="flex flex-col gap-2 max-h-[500px] overflow-y-auto pr-2">
                                        {db.artists.map(a => (
                                            <div key={a.id} className="bg-slate-950 p-3 rounded-xl border border-slate-800 flex justify-between items-center group">
                                                <div className="flex items-center gap-4">
                                                    {a.cover ? <img src={a.cover} className="w-12 h-12 rounded-full object-cover border border-slate-700 shadow-md" /> : <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center"><i className="ph-fill ph-user text-slate-500"></i></div>}
                                                    <div>
                                                        <p className="font-bold text-slate-200 text-lg">{a.name}</p>
                                                        <p className="text-xs text-slate-500">{a.genre}</p>
                                                    </div>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => editArtist(a)} className="text-slate-600 hover:text-blue-400 p-2 transition-colors">
                                                        <i className="ph-fill ph-pencil-simple text-xl"></i>
                                                    </button>
                                                    <button onClick={() => handleDeleteArtist(a.id)} className="text-slate-600 hover:text-red-500 p-2 transition-colors">
                                                        <i className="ph-fill ph-trash text-xl"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                        {db.artists.length === 0 && <p className="text-slate-500 text-center py-10">Vazio.</p>}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-md border-b border-slate-800 print-hidden">
                        <div className="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={goHome}>
                                <div className="w-12 h-12 bg-gradient-to-br from-emerald-400 to-cyan-500 rounded-xl flex items-center justify-center text-slate-950 group-hover:rotate-12 transition-transform shadow-lg shadow-emerald-500/20">
                                    <i className="ph-fill ph-microphone-stage text-3xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-slate-100 leading-none tracking-tight">Karaoke<span className="text-emerald-400">Cifra</span></h1>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <div className="hidden lg:flex relative">
                                    <i className="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Música ou artista..." 
                                        value={search}
                                        onChange={(e) => { setSearch(e.target.value); if(view !== 'home' && view !== 'admin') goHome(); }}
                                        className="bg-slate-900 border border-slate-800 rounded-full py-2 pl-12 pr-4 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 w-72 placeholder:text-slate-500 transition-colors shadow-inner"
                                    />
                                </div>
                                
                                <button onClick={() => setShowPix(true)} className="flex items-center gap-2 bg-purple-600 hover:bg-purple-500 text-white px-5 py-2 rounded-full font-bold text-sm transition-all shadow-[0_0_15px_-3px_rgba(147,51,234,0.5)]">
                                    <i className="ph-fill ph-heart"></i> <span className="hidden sm:inline">Apoiar</span>
                                </button>

                                <button onClick={goAdmin} className="flex items-center justify-center w-10 h-10 bg-slate-900 border border-slate-700 hover:bg-slate-800 rounded-full text-slate-400 hover:text-emerald-400 transition-colors" title="Painel Admin">
                                    <i className="ph-fill ph-gear text-xl"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full px-4 py-8 flex-grow">
                        {view === 'home' && renderHome()}
                        {view === 'category' && renderCategory()}
                        {view === 'artist' && renderArtist()}
                        {view === 'song' && renderSong()}
                        {view === 'admin-login' && renderAdminLogin()}
                        {view === 'admin' && renderAdmin()}
                    </main>

                    <footer className="border-t border-slate-800 bg-slate-950 mt-auto py-10 print-hidden">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <i className="ph-fill ph-microphone-stage text-3xl text-slate-800 mb-2"></i>
                            <p className="text-slate-500 text-sm font-medium">O seu palco virtual. Feito com <i className="ph-fill ph-heart text-red-500"></i> para a comunidade.</p>
                        </div>
                    </footer>

                    {showPix && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out] print-hidden">
                            <div className="bg-slate-900 border border-slate-700 rounded-3xl p-8 max-w-md w-full relative shadow-2xl">
                                <button onClick={() => setShowPix(false)} className="absolute top-4 right-4 text-slate-500 hover:text-slate-300 bg-slate-800 rounded-full p-1">
                                    <i className="ph ph-x text-xl"></i>
                                </button>
                                
                                <div className="text-center">
                                    <div className="w-20 h-20 bg-gradient-to-br from-purple-600 to-pink-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-purple-500/30">
                                        <i className="ph-fill ph-currency-circle-dollar text-4xl"></i>
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-100 mb-2">Apoie o Canal!</h3>
                                    <p className="text-slate-400 mb-6 text-sm">A sua contribuição mantém o acervo gigante de FLAC e Backing Tracks sempre online no Drive.</p>
                                    
                                    <div className="bg-slate-950 border border-slate-800 p-4 rounded-xl mb-6 shadow-inner">
                                        <p className="text-xs text-slate-500 uppercase tracking-widest font-bold mb-1">Chave PIX (E-mail ou Telemóvel)</p>
                                        <p className="text-emerald-400 font-mono text-xl font-bold select-all">seu-email@gmail.com</p>
                                    </div>
                                    
                                    <button onClick={() => { navigator.clipboard.writeText("seu-email@gmail.com"); alert("Chave PIX copiada!"); }} className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                                        <i className="ph-bold ph-copy"></i> Copiar Chave PIX
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
