<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke com Cifra</title>
    
    <!-- Tailwind CSS para o design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ícones Phosphor para um aspeto moderno -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar o React no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Estilos base personalizados */
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .cifra-text { font-family: 'Courier New', Courier, monospace; }
        /* Realce verde para a cifra */
        .cifra-text b { color: #34d399; font-weight: bold; }
        
        /* Personalização do scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Estilos para Impressão e PDF */
        @media print {
            body { background-color: #fff !important; color: #000 !important; }
            .print-hidden { display: none !important; }
            .print-cifra-box { background: transparent !important; border: none !important; padding: 0 !important; box-shadow: none !important; overflow: visible !important; }
            .cifra-text { color: #000 !important; white-space: pre-wrap !important; word-wrap: break-word !important; }
            .cifra-text b { color: #000 !important; font-weight: 900 !important; font-size: 1.1em; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // BASE DE DADOS INICIAL
        // Cole o código exportado do Painel Admin por cima deste bloco para atualizar no GitHub
        // ==========================================
        const initialDB = {
            artists: [
                { id: 'titas', name: 'Titãs', cover: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=500&q=80', genre: 'Rock' },
                { id: 'legiao', name: 'Legião Urbana', cover: 'https://images.unsplash.com/photo-1526478806334-5fd488fcaabc?auto=format&fit=crop&w=500&q=80', genre: 'Rock Nacional' },
                { id: 'roupanova', name: 'Roupa Nova', cover: 'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?auto=format&fit=crop&w=500&q=80', genre: 'Pop/Romântico' }
            ],
            songs: [
                {
                    id: 'epitafio',
                    artistId: 'titas',
                    title: 'Epitáfio',
                    key: 'G',
                    bpm: '82',
                    flacLink: 'COLOQUE_SEU_LINK_DO_DRIVE_AQUI',
                    backingTrackLink: 'COLOQUE_SEU_LINK_DO_DRIVE_AQUI',
                    cifra: `Tom: <b>G</b>\n\nIntro: <b>G</b>  <b>D/F#</b>  <b>Em</b>  <b>C</b> (2x)\n\n<b>G</b>             <b>D/F#</b>\nDevia ter amado mais\n          <b>Em</b>\nTer chorado mais\n          <b>C</b>                 <b>G</b>\nTer visto o sol nascer\n<b>G</b>             <b>D/F#</b>\nDevia ter arriscado mais\n        <b>Em</b>\nE até errado mais\n         <b>C</b>                 <b>G</b>\nTer feito o que eu queria fazer`
                },
                {
                    id: 'tempo-perdido',
                    artistId: 'legiao',
                    title: 'Tempo Perdido',
                    key: 'C',
                    bpm: '115',
                    flacLink: 'COLOQUE_SEU_LINK_DO_DRIVE_AQUI',
                    backingTrackLink: 'COLOQUE_SEU_LINK_DO_DRIVE_AQUI',
                    cifra: `Tom: <b>C</b>\n\nIntro: <b>C</b>  <b>Am7</b>  <b>Bm</b>  <b>Em</b> (2x)\n\n<b>C</b>             <b>Am7</b>\nTodos os dias quando acordo\n<b>Bm</b>              <b>Em</b>\nNão tenho mais o tempo que passou\n<b>C</b>             <b>Am7</b>\nMas tenho muito tempo\n<b>Bm</b>              <b>Em</b>\nTemos todo o tempo do mundo`
                },
                {
                    id: 'whisky-a-go-go',
                    artistId: 'roupanova',
                    title: 'Whisky a Go-Go',
                    key: 'A',
                    bpm: '130',
                    flacLink: 'COLOQUE_SEU_LINK_DO_DRIVE_AQUI',
                    backingTrackLink: 'COLOQUE_SEU_LINK_DO_DRIVE_AQUI',
                    cifra: `Tom: <b>A</b>\n\nIntro: <b>A</b>  <b>D</b>  <b>E</b> (4x)\n\n<b>A</b>              <b>D</b>           <b>E</b>\nFoi numa festa, gelo e cuba-libre\n<b>A</b>             <b>D</b>            <b>E</b>\nE na vitrola rolando um som\n<b>A</b>              <b>D</b>         <b>E</b>\nQue eu te vi dançar, linda`
                }
            ]
        };

        // ==========================================
        // COMPONENTE PRINCIPAL (APLICAÇÃO)
        // ==========================================
        function App() {
            // Inicializar a BD (Recupera do LocalStorage se existir, senão usa a initialDB)
            const [db, setDb] = useState(() => {
                const saved = localStorage.getItem('karaoke_db');
                return saved ? JSON.parse(saved) : initialDB;
            });

            // Guardar no LocalStorage sempre que a BD muda
            useEffect(() => {
                localStorage.setItem('karaoke_db', JSON.stringify(db));
            }, [db]);

            // Gestão de estado para a navegação
            const [view, setView] = useState('home'); // 'home', 'artist', 'song', 'admin'
            const [activeArtist, setActiveArtist] = useState(null);
            const [activeSong, setActiveSong] = useState(null);
            const [search, setSearch] = useState('');
            const [showPix, setShowPix] = useState(false);

            // Estados do Admin
            const [adminTab, setAdminTab] = useState('artists');
            const [newArtist, setNewArtist] = useState({ name: '', cover: '', genre: '' });
            const [newSong, setNewSong] = useState({ artistId: '', title: '', key: '', bpm: '', flacLink: '', backingTrackLink: '', cifra: '' });

            // Funções de navegação
            const goHome = () => {
                setView('home');
                setActiveArtist(null);
                setActiveSong(null);
                window.scrollTo(0, 0);
            };

            const goArtist = (artist) => {
                setActiveArtist(artist);
                setView('artist');
                window.scrollTo(0, 0);
            };

            const goSong = (song) => {
                setActiveSong(song);
                setView('song');
                window.scrollTo(0, 0);
            };

            const goAdmin = () => {
                setView('admin');
                window.scrollTo(0, 0);
            }

            // Filtrar artistas na página inicial
            const filteredArtists = db.artists.filter(a => 
                a.name.toLowerCase().includes(search.toLowerCase())
            );

            // ==========================================
            // VISTAS (VIEWS) DO SITE PÚBLICO
            // ==========================================
            
            // 1. Vista Inicial (Lista de Artistas)
            const renderHome = () => (
                <div className="animate-[fadeIn_0.5s_ease-out]">
                    <div className="text-center py-12 px-4 mb-8 bg-slate-900/50 rounded-3xl border border-slate-800">
                        <h2 className="text-4xl md:text-6xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500">
                            Karaoke com Cifra
                        </h2>
                        <p className="text-slate-400 text-lg max-w-2xl mx-auto">
                            O seu acervo definitivo de Cifras, faixas FLAC (sem perda) e Backing Tracks profissionais.
                        </p>
                    </div>

                    <div className="flex items-center gap-2 mb-6">
                        <i className="ph ph-microphone-stage text-2xl text-emerald-500"></i>
                        <h3 className="text-2xl font-bold text-slate-100">Artistas</h3>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                        {filteredArtists.map(artist => (
                            <div 
                                key={artist.id}
                                onClick={() => goArtist(artist)}
                                className="group cursor-pointer bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-emerald-500/50 transition-all duration-300 hover:shadow-[0_0_20px_-5px_rgba(16,185,129,0.3)]"
                            >
                                <div className="aspect-square relative overflow-hidden bg-slate-800 flex items-center justify-center">
                                    {artist.cover ? (
                                        <img src={artist.cover} alt={artist.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                    ) : (
                                        <i className="ph ph-microphone-stage text-4xl text-slate-600"></i>
                                    )}
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/20 to-transparent"></div>
                                </div>
                                <div className="p-4">
                                    <span className="text-xs font-bold text-emerald-500 uppercase tracking-wider">{artist.genre}</span>
                                    <h4 className="font-bold text-xl text-slate-100 mt-1">{artist.name}</h4>
                                    <p className="text-slate-500 text-sm mt-1">
                                        {db.songs.filter(s => s.artistId === artist.id).length} músicas
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>
                    {filteredArtists.length === 0 && (
                        <div className="text-center py-12 text-slate-500">
                            Nenhum artista encontrado. Adicione um na Área Administrativa.
                        </div>
                    )}
                </div>
            );

            // 2. Vista do Artista (Lista de Músicas)
            const renderArtist = () => {
                const songs = db.songs.filter(s => s.artistId === activeArtist.id);
                
                return (
                    <div className="animate-[fadeIn_0.3s_ease-out]">
                        <button onClick={goHome} className="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 mb-6 font-medium">
                            <i className="ph ph-arrow-left font-bold"></i> Voltar
                        </button>

                        <div className="flex flex-col md:flex-row gap-6 mb-10 items-center md:items-start">
                            {activeArtist.cover ? (
                                <img src={activeArtist.cover} alt={activeArtist.name} className="w-40 h-40 rounded-full object-cover border-4 border-slate-800 shadow-2xl" />
                            ) : (
                                <div className="w-40 h-40 rounded-full bg-slate-800 border-4 border-slate-700 flex items-center justify-center text-5xl text-slate-600">
                                    <i className="ph ph-user"></i>
                                </div>
                            )}
                            <div className="text-center md:text-left pt-4">
                                <h2 className="text-5xl font-black text-slate-100">{activeArtist.name}</h2>
                                <p className="text-emerald-500 font-medium mt-2 text-lg">{activeArtist.genre}</p>
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                            <div className="bg-slate-800/50 p-4 border-b border-slate-800">
                                <h3 className="font-bold text-lg text-slate-200">Repertório</h3>
                            </div>
                            <div className="divide-y divide-slate-800/50">
                                {songs.map(song => (
                                    <div 
                                        key={song.id} 
                                        onClick={() => goSong(song)}
                                        className="p-4 flex items-center justify-between hover:bg-slate-800/30 cursor-pointer group transition-colors"
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-emerald-500 group-hover:bg-emerald-500 group-hover:text-slate-900 transition-colors">
                                                <i className="ph-fill ph-play"></i>
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-slate-200 text-lg">{song.title}</h4>
                                                <p className="text-slate-500 text-sm">Tom: {song.key} • BPM: {song.bpm}</p>
                                            </div>
                                        </div>
                                        <i className="ph ph-caret-right text-slate-600 group-hover:text-emerald-500"></i>
                                    </div>
                                ))}
                                {songs.length === 0 && (
                                    <div className="p-8 text-center text-slate-500">Sem músicas registadas neste artista.</div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            // 3. Vista da Música (Cifra e Botões)
            const renderSong = () => (
                <div className="animate-[fadeIn_0.3s_ease-out] print-cifra-box">
                    <button onClick={() => goArtist(activeArtist)} className="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 mb-6 font-medium print-hidden">
                        <i className="ph ph-arrow-left font-bold"></i> Voltar para {activeArtist.name}
                    </button>

                    <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-3xl p-6 md:p-10 mb-8 shadow-2xl relative overflow-hidden print-hidden">
                        <div className="absolute top-[-20%] right-[-10%] text-slate-800/50">
                            <i className="ph-fill ph-music-notes text-[250px]"></i>
                        </div>
                        
                        <div className="relative z-10">
                            <h2 className="text-4xl md:text-5xl font-black text-slate-100 mb-2">{activeSong.title}</h2>
                            <p className="text-xl text-emerald-500 mb-6">{activeArtist.name}</p>
                            
                            <div className="flex flex-col md:flex-row gap-4">
                                {/* Botão FLAC */}
                                {activeSong.flacLink && (
                                    <a href={activeSong.flacLink} target="_blank" rel="noreferrer" 
                                    className="flex items-center justify-center gap-3 bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-6 py-4 rounded-xl font-bold transition-all transform hover:scale-[1.02] shadow-[0_0_20px_-5px_rgba(16,185,129,0.5)]">
                                        <i className="ph-fill ph-file-audio text-2xl"></i>
                                        Baixar Áudio FLAC
                                    </a>
                                )}
                                
                                {/* Botão Backing Track */}
                                {activeSong.backingTrackLink && (
                                    <a href={activeSong.backingTrackLink} target="_blank" rel="noreferrer" 
                                    className="flex items-center justify-center gap-3 bg-blue-600 hover:bg-blue-500 text-white px-6 py-4 rounded-xl font-bold transition-all transform hover:scale-[1.02] shadow-[0_0_20px_-5px_rgba(37,99,235,0.4)]">
                                        <i className="ph-fill ph-waveform text-2xl"></i>
                                        Baixar Backing Tracks / Stems
                                    </a>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 print-cifra-box">
                        <div className="flex items-center justify-between gap-2 mb-6 border-b border-slate-800 pb-4 print-hidden">
                            <div className="flex items-center gap-2">
                                <i className="ph-fill ph-text-aa text-emerald-500 text-2xl"></i>
                                <h3 className="text-2xl font-bold text-slate-200">Cifra e Letra</h3>
                            </div>
                            
                            <button 
                                onClick={() => window.print()}
                                className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-xl text-sm font-bold transition-colors border border-slate-700 hover:border-emerald-500/50"
                            >
                                <i className="ph ph-printer text-lg"></i>
                                Imprimir / PDF
                            </button>
                        </div>
                        
                        <div className="bg-[#0f172a] p-6 rounded-xl border border-slate-800 overflow-x-auto print-cifra-box">
                            <div className="print-only mb-6 border-b border-gray-300 pb-4">
                                <h1 className="text-3xl font-black mb-1">{activeSong.title}</h1>
                                <h2 className="text-xl text-gray-700 mb-3">{activeArtist.name}</h2>
                                <p className="text-sm">Tom: <b>{activeSong.key}</b> • BPM: <b>{activeSong.bpm}</b></p>
                            </div>
                            <pre 
                                className="cifra-text text-slate-300 text-sm md:text-base leading-relaxed"
                                dangerouslySetInnerHTML={{ __html: activeSong.cifra }}
                            />
                        </div>
                    </div>
                </div>
            );

            // ==========================================
            // VISTA DE ADMINISTRAÇÃO (ÁREA CMS)
            // ==========================================
            const renderAdmin = () => {
                const handleAddArtist = (e) => {
                    e.preventDefault();
                    const id = newArtist.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                    if (db.artists.find(a => a.id === id)) return alert('Artista já existe!');
                    setDb({ ...db, artists: [...db.artists, { ...newArtist, id }] });
                    setNewArtist({ name: '', cover: '', genre: '' });
                    alert('Artista adicionado com sucesso!');
                };

                const handleAddSong = (e) => {
                    e.preventDefault();
                    if (!newSong.artistId) return alert('Selecione um Artista!');
                    const id = newSong.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                    setDb({ ...db, songs: [...db.songs, { ...newSong, id }] });
                    setNewSong({ artistId: '', title: '', key: '', bpm: '', flacLink: '', backingTrackLink: '', cifra: '' });
                    alert('Música adicionada com sucesso!');
                };

                const deleteArtist = (id) => {
                    if(!confirm('Apagar artista e todas as suas músicas?')) return;
                    setDb({
                        ...db,
                        artists: db.artists.filter(a => a.id !== id),
                        songs: db.songs.filter(s => s.artistId !== id)
                    });
                };

                const deleteSong = (id) => {
                    if(!confirm('Apagar esta música?')) return;
                    setDb({ ...db, songs: db.songs.filter(s => s.id !== id) });
                };

                return (
                    <div className="animate-[fadeIn_0.3s_ease-out]">
                        <div className="flex items-center justify-between mb-8 border-b border-slate-800 pb-4">
                            <div>
                                <h2 className="text-3xl font-black text-slate-100 flex items-center gap-3">
                                    <i className="ph-fill ph-gear text-emerald-500"></i> Área Administrativa
                                </h2>
                                <p className="text-slate-400 mt-1">Gira os seus artistas, músicas e exporte o código para o GitHub.</p>
                            </div>
                            <button onClick={goHome} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold">
                                Sair do Admin
                            </button>
                        </div>

                        {/* Tabs */}
                        <div className="flex gap-2 mb-6 overflow-x-auto">
                            <button onClick={() => setAdminTab('artists')} className={`px-4 py-2 rounded-lg font-bold whitespace-nowrap ${adminTab === 'artists' ? 'bg-emerald-500 text-slate-950' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>Gerir Artistas (Pastas)</button>
                            <button onClick={() => setAdminTab('songs')} className={`px-4 py-2 rounded-lg font-bold whitespace-nowrap ${adminTab === 'songs' ? 'bg-emerald-500 text-slate-950' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>Gerir Músicas (Ficheiros)</button>
                            <button onClick={() => setAdminTab('export')} className={`px-4 py-2 rounded-lg font-bold whitespace-nowrap ${adminTab === 'export' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>Exportar para GitHub</button>
                        </div>

                        {/* Tab: Artistas */}
                        {adminTab === 'artists' && (
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                    <h3 className="text-xl font-bold mb-4">Adicionar Novo Artista</h3>
                                    <form onSubmit={handleAddArtist} className="flex flex-col gap-4">
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">Nome do Artista/Banda</label>
                                            <input required type="text" value={newArtist.name} onChange={e => setNewArtist({...newArtist, name: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none" placeholder="Ex: Coldplay" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">Género Musical</label>
                                            <input type="text" value={newArtist.genre} onChange={e => setNewArtist({...newArtist, genre: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none" placeholder="Ex: Pop Rock" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">Link da Imagem (Capa)</label>
                                            <input type="url" value={newArtist.cover} onChange={e => setNewArtist({...newArtist, cover: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none" placeholder="https://..." />
                                        </div>
                                        <button type="submit" className="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold p-3 rounded-lg mt-2">Criar Artista</button>
                                    </form>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                    <h3 className="text-xl font-bold mb-4">Artistas Existentes ({db.artists.length})</h3>
                                    <div className="flex flex-col gap-2 max-h-[400px] overflow-y-auto pr-2">
                                        {db.artists.map(a => (
                                            <div key={a.id} className="bg-slate-950 p-3 rounded-lg border border-slate-800 flex justify-between items-center">
                                                <div>
                                                    <p className="font-bold text-slate-200">{a.name}</p>
                                                    <p className="text-xs text-slate-500">{a.genre}</p>
                                                </div>
                                                <button onClick={() => deleteArtist(a.id)} className="text-red-500 hover:text-red-400 p-2 bg-slate-900 rounded-md">
                                                    <i className="ph ph-trash"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab: Músicas */}
                        {adminTab === 'songs' && (
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                    <h3 className="text-xl font-bold mb-4">Adicionar Nova Música</h3>
                                    <form onSubmit={handleAddSong} className="flex flex-col gap-4">
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">Artista</label>
                                            <select required value={newSong.artistId} onChange={e => setNewSong({...newSong, artistId: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none">
                                                <option value="">Selecione um Artista...</option>
                                                {db.artists.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm text-slate-400 mb-1">Título da Música</label>
                                                <input required type="text" value={newSong.title} onChange={e => setNewSong({...newSong, title: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-sm text-slate-400 mb-1">Tom</label>
                                                    <input type="text" value={newSong.key} onChange={e => setNewSong({...newSong, key: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none" placeholder="Ex: G" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm text-slate-400 mb-1">BPM</label>
                                                    <input type="text" value={newSong.bpm} onChange={e => setNewSong({...newSong, bpm: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none" placeholder="120" />
                                                </div>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">Link Áudio FLAC (Google Drive/etc)</label>
                                            <input type="url" value={newSong.flacLink} onChange={e => setNewSong({...newSong, flacLink: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none" placeholder="https://" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">Link Backing Tracks / Stems (Multi-pistas)</label>
                                            <input type="url" value={newSong.backingTrackLink} onChange={e => setNewSong({...newSong, backingTrackLink: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none" placeholder="https://" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">Letra com Cifra HTML (use &lt;b&gt;Acorde&lt;/b&gt; para destacar)</label>
                                            <textarea required rows="8" value={newSong.cifra} onChange={e => setNewSong({...newSong, cifra: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-emerald-500 outline-none font-mono text-sm" placeholder="Tom: <b>G</b>\n\n<b>G</b>                <b>D</b>\nLetra da música aqui"></textarea>
                                        </div>
                                        <button type="submit" className="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold p-3 rounded-lg mt-2">Gravar Música</button>
                                    </form>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                    <h3 className="text-xl font-bold mb-4">Músicas Existentes ({db.songs.length})</h3>
                                    <div className="flex flex-col gap-2 max-h-[600px] overflow-y-auto pr-2">
                                        {db.songs.map(s => {
                                            const artist = db.artists.find(a => a.id === s.artistId);
                                            return (
                                                <div key={s.id} className="bg-slate-950 p-3 rounded-lg border border-slate-800 flex justify-between items-center">
                                                    <div>
                                                        <p className="font-bold text-slate-200">{s.title}</p>
                                                        <p className="text-xs text-slate-500">{artist ? artist.name : 'Desconhecido'}</p>
                                                    </div>
                                                    <button onClick={() => deleteSong(s.id)} className="text-red-500 hover:text-red-400 p-2 bg-slate-900 rounded-md">
                                                        <i className="ph ph-trash"></i>
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab: Exportar */}
                        {adminTab === 'export' && (
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-10 max-w-3xl mx-auto text-center">
                                <i className="ph-fill ph-github-logo text-6xl text-slate-400 mb-4"></i>
                                <h3 className="text-2xl font-black mb-2">Salve o seu trabalho!</h3>
                                <p className="text-slate-400 mb-6">Como o GitHub Pages é gratuito e estático, precisa de atualizar o ficheiro <code className="bg-slate-800 px-1 rounded text-emerald-400">index.html</code> no seu repositório para as alterações ficarem online para os outros utilizadores.</p>
                                
                                <div className="bg-slate-950 p-4 rounded-xl text-left border border-slate-800 relative">
                                    <button 
                                        onClick={() => {
                                            navigator.clipboard.writeText(`const initialDB = ${JSON.stringify(db, null, 4)};`);
                                            alert("Código copiado! Cole-o por cima da secção initialDB no seu ficheiro index.html");
                                        }}
                                        className="absolute top-4 right-4 bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-1 rounded-md text-sm font-bold border border-slate-600 flex items-center gap-2"
                                    >
                                        <i className="ph ph-copy"></i> Copiar Código
                                    </button>
                                    <p className="text-slate-500 text-sm mb-3">1. Copie o bloco abaixo.</p>
                                    <p className="text-slate-500 text-sm mb-4">2. Substitua o bloco <code className="text-emerald-400">const initialDB = ...</code> no seu código-fonte.</p>
                                    <pre className="text-xs text-emerald-400 font-mono overflow-x-auto max-h-[300px]">
                                        const initialDB = {JSON.stringify(db, null, 4)};
                                    </pre>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // ==========================================
            // ESTRUTURA GLOBAL DA PÁGINA
            // ==========================================
            return (
                <div className="min-h-screen flex flex-col">
                    {/* Cabeçalho */}
                    <header className="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800 print-hidden">
                        <div className="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={goHome}>
                                <div className="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center text-slate-950 group-hover:rotate-12 transition-transform">
                                    <i className="ph-fill ph-microphone-stage text-2xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-100 leading-none">Karaoke<span className="text-emerald-500">Cifra</span></h1>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="hidden md:flex relative">
                                    <i className="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Procurar artista..." 
                                        value={search}
                                        onChange={(e) => { setSearch(e.target.value); if(view !== 'home' && view !== 'admin') goHome(); }}
                                        className="bg-slate-900 border border-slate-700 rounded-full py-2 pl-10 pr-4 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 w-64 placeholder:text-slate-600"
                                    />
                                </div>
                                
                                {/* Botão PIX Global */}
                                <button 
                                    onClick={() => setShowPix(true)}
                                    className="flex items-center gap-2 bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-full font-bold text-sm transition-colors"
                                >
                                    <i className="ph-fill ph-hands-clapping"></i>
                                    Ajudar Canal
                                </button>

                                {/* Botão de Administração */}
                                <button 
                                    onClick={goAdmin}
                                    className="flex items-center justify-center w-10 h-10 bg-slate-900 border border-slate-700 hover:bg-slate-800 rounded-full text-slate-400 hover:text-emerald-400 transition-colors"
                                    title="Área Administrativa"
                                >
                                    <i className="ph-fill ph-gear text-xl"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="max-w-6xl mx-auto w-full px-4 py-8 flex-grow">
                        {view === 'home' && renderHome()}
                        {view === 'artist' && renderArtist()}
                        {view === 'song' && renderSong()}
                        {view === 'admin' && renderAdmin()}
                    </main>

                    {/* Rodapé */}
                    <footer className="border-t border-slate-800 bg-slate-900 mt-auto py-8 print-hidden">
                        <div className="max-w-6xl mx-auto px-4 text-center text-slate-500 text-sm">
                            <p className="flex items-center justify-center gap-2">
                                Criado com <i className="ph-fill ph-heart text-red-500"></i> para músicos.
                            </p>
                        </div>
                    </footer>

                    {/* Modal PIX */}
                    {showPix && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out] print-hidden">
                            <div className="bg-slate-900 border border-slate-700 rounded-3xl p-8 max-w-md w-full relative">
                                <button 
                                    onClick={() => setShowPix(false)}
                                    className="absolute top-4 right-4 text-slate-500 hover:text-slate-300"
                                >
                                    <i className="ph ph-x text-2xl"></i>
                                </button>
                                
                                <div className="text-center">
                                    <div className="w-16 h-16 bg-purple-600/20 text-purple-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i className="ph-fill ph-currency-circle-dollar text-3xl"></i>
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-100 mb-2">Apoie o Canal!</h3>
                                    <p className="text-slate-400 mb-6">
                                        O seu apoio ajuda a manter os ficheiros FLAC e Backing Tracks sempre online.
                                    </p>
                                    
                                    <div className="bg-slate-950 border border-slate-800 p-4 rounded-xl mb-6">
                                        <p className="text-xs text-slate-500 uppercase tracking-widest font-bold mb-1">Chave PIX (E-mail ou Telemóvel)</p>
                                        <p className="text-emerald-400 font-mono text-lg font-bold select-all">seu-email@gmail.com</p>
                                    </div>
                                    
                                    <button 
                                        onClick={() => {
                                            navigator.clipboard.writeText("seu-email@gmail.com");
                                            alert("Chave PIX copiada para a área de transferência!");
                                        }}
                                        className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2"
                                    >
                                        <i className="ph ph-copy"></i> Copiar Chave PIX
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Renderizar a App no DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
